notes:
  - A CVE request was filed with MITRE on 2026-02-16.
  - Prereleases of OpenStack software are not official production
    releases and so not covered by the affected versions list.
    The first Glance release candidate for gazpacho (32.0.0.0rc1)
    is vulnerable; 32.0.0.0rc2 will contain the fix.
  - The unmaintained/2023.1 branch, being unmaintained, will receive
    no new point releases, but a patch for it is provided as a
    courtesy.

