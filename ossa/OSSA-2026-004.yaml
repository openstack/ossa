date: 2026-03-19

id: OSSA-2026-004

title: Server-Side Request Forgery (SSRF) vulnerabilities in OpenStack Glance image import functionality

description: |+
  Hyeongeun_Ji of Open the Window and Abhishek Kekane of Red Hat
  reported multiple Server-Side Request Forgery (SSRF)
  vulnerabilities in Glance image import. By use of HTTP redirects,
  an authenticated user can bypass URL validation checks and
  redirect to internal services.

  Only glance image import functionality is affected. In particular,
  the 'web-download' and 'glance-download' import methods are
  subject to this vulnerability, as is the optional (not enabled by
  default) 'ovf_process' image import plugin.  We discuss each of
  the vulnerabilities in turn below.

  web-download Import Method SSRF
  -------------------------------
  The web-download import method has two SSRF vulnerabilities:

  HTTP Redirect Bypass
  ++++++++++++++++++++
  The web-download import method did not validate redirect
  destinations when following HTTP redirects. An attacker could
  provide an initial URL that passed validation but redirected to an
  internal or disallowed resource; the redirected URL was not
  subject to security checks.

  This is fixed by implementing a SafeRedirectHandler that validates
  redirect destinations before following them, using same
  validate_import_uri() checks as the initial URL.

  IP Address Encoding Bypass
  ++++++++++++++++++++++++++
  The web-download import method URL validation could be bypassed by
  encoding IP addresses in alternative formats (decimal integer,
  hexadecimal, octal).  For example, 127.0.0.1 could be encoded as
  2130706433 (decimal) or 0x7f000001 (hexadecimal) to bypass
  blacklist checks.

  This is fixed by implementing a normalize_hostname() function that
  uses the Python standard library ipaddress module to validate IP
  addresses. The ipaddress module only accepts standard
  dotted-decimal notation for IPv4 and standard format for IPv6,
  automatically rejecting all encoded formats (decimal, hexadecimal,
  octal). Any attempt to use encoded IP formats is rejected, thereby
  preventing SSRF bypass attacks.

  glance-download Import Method SSRF
  ----------------------------------
  The glance-download import method had redirect validation bypass
  vulnerabilities in two steps of the import flow:

  Image Data Download
  +++++++++++++++++++
  When downloading image data from a remote Glance endpoint,
  redirects were not validated, allowing attackers to redirect to
  internal services.

  Metadata Fetch
  ++++++++++++++
  When fetching image metadata from a remote Glance endpoint,
  redirects were not validated, allowing attackers to redirect to
  internal services.

  Both steps are fixed by using the SafeRedirectHandler described
  earlier to validate redirect destinations before following them.

  OVF Processing SSRF
  -------------------
  The OVF processing functionality had critical SSRF vulnerability
  with zero protection - no URI validation, no redirect validation,
  and no IP normalization. The code directly called
  urllib.request.urlopen(uri) without any validation checks. This is
  fixed by adding URI validation using validate_import_uri() and
  redirect validation using SafeRedirectHandler.

errata: >
  CVE-2026-34881 was assigned by MITRE after publication.  If any
  other CNA has assigned a CVE themselves in the meantime, please
  reject it so that we don't end up with duplicates.

