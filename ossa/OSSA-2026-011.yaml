date: 2026-05-07

id: OSSA-2026-011

title: Multiple access control vulnerabilities in Cyborg accelerator management

description: >
  Sean Mooney from Red Hat reported multiple access control
  vulnerabilities in OpenStack Cyborg. Default policy rules for
  device, deployable, and
  attribute API endpoints use an unconditional allow check that grants
  access to any authenticated user regardless of roles or project
  scope (CVE-2026-40213). Separately, Accelerator Request (ARQ)
  resources lack project ownership enforcement, allowing any
  authenticated user to enumerate, delete, or manipulate ARQs
  belonging to other projects (CVE-2026-40214). All Cyborg
  deployments are affected.

affected-products:
  - product: cyborg
    version: '>=3.0.0 <14.0.1, >=15.0.0 <15.0.1, >=16.0.0 <16.0.1'

vulnerabilities:
  - cve-id: CVE-2026-40213
  - cve-id: CVE-2026-40214

reporters:
  - name: Sean Mooney
    affiliation: Red Hat
    reported:
      - CVE-2026-40213
      - CVE-2026-40214

