date: 2026-04-14

id: OSSA-2026-007

title: LDAP identity backend does not convert enabled attribute to boolean

description: >
  Benedikt Trefzer and Andrew Bogott independently reported a
  vulnerability in the Keystone LDAP identity backend. When the
  user_enabled_invert configuration option was False (the default),
  Keystone did not correctly interpret the LDAP enabled attribute,
  causing users disabled in LDAP to be treated as enabled and allowed
  to authenticate. Deployments using the LDAP identity backend
  without user_enabled_invert=True or user_enabled_emulation are
  affected.

affected-products:
  - product: keystone
    version: '>=8.0.0 <25.0.1, >=26.0.0 <26.1.1, >=27.0.0 <27.0.1, >=28.0.0 <28.0.1'

vulnerabilities:
