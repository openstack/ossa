date: 2026-04-27

id: OSSA-2026-008

title: Command Injection in Ironic IPMI Console Implementations

description: >
  Dmitry Tantsur and Tuomo Tanskanen from the Metal3.io Security Team
  reported a vulnerability in Ironic's IPMI console backends. A
  project manager for the project marked as a ``node.owner`` can inject
  arbitrary commands which a conductor executes on console activation.

  No console backends are enabled by default in Ironic. Only
  installations which have set ``[conductor]/enabled_console_interfaces`` to
  enable either ``ipmitool-shellinabox`` or ``ipmitool-socat`` are vulnerable.

affected-products:
  - product: ironic
    version: '>=4.3.0 <26.1.6, >=27.0.0 <29.0.5, >=30.0.0 <32.0.1, >=33.0.0 <35.0.1'

vulnerabilities:
