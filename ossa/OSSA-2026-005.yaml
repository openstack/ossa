date: 2026-04-07

id: OSSA-2026-005

title: Restricted application credentials can create EC2 credentials

description: >
  Maxence Bornecque from Orange Cyberdefense CERT Vulnerability
  Intelligence Watch Team reported a vulnerability in Keystone's EC2
  credential creation endpoint. By using a restricted application
  credential to call the EC2 credential creation API, an authenticated
  user with only a reader role may obtain an EC2/S3 credential that
  carries the full set of the parent user's S3 permissions,
  effectively bypassing the role restrictions imposed on the
  application credential. Only deployments that use restricted
  application credentials in combination with the EC2/S3 compatibility
  API (swift3 / s3api) are affected.

affected-products:
  - product: keystone
    version: '>=14.0.0 <26.1.1, ==27.0.0, ==28.0.0, ==29.0.0'

