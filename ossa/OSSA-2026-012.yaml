date: 2026-05-11

id: OSSA-2026-012

title: Remote Code Execution in Ironic conductor when Anaconda driver enabled

description: >
  Dmitry Tantsur (Red Hat) and Tuomo Tanskanen (Ericsson Software Technology)
  from the Metal3.io Security Team reported a vulnerability in Ironic's
  anaconda deploy interface. Users who can set
  ``node.instance_info['ks_template']`` can achieve remove code execution on
  the ironic-conductor process, as the template is rendered without
  sandboxing.

  In the default configuration, Ironic is not vulnerable to this issue. However,
  operators who have enabled the anaconda deploy interface by adding it to
  ``[conductor]/enabled_deploy_interfaces`` and have untrusted users with access
  to modify ``node.instance_info`` are at risk.

